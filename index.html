<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roth IRA Calculator</title>
  <link rel="canonical" href="https://rothiracalculator.app/" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #2c3e50; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 20px; background: #2980b9; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
    button:hover { background: #1a6ea8; }
    #result { margin-top: 20px; font-size: 1.2em; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    .cta:hover { background: #1e8449; }
    footer { margin-top: 40px; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>
  <h1>Roth IRA Calculator</h1>
  <p>Estimate your Roth IRA growth and retirement savings.</p>

  <label>Initial Investment ($)
    <input type="number" id="initial" placeholder="5000" />
  </label>
  <label>Annual Contribution ($)
    <input type="number" id="annual" placeholder="6000" />
  </label>
  <label>Annual Return Rate (%)
    <input type="number" id="rate" placeholder="7" step="0.1" />
  </label>
  <label>Years Until Retirement
    <input type="number" id="years" placeholder="30" />
  </label>
  <button onclick="calculate()">Calculate</button>
  <div id="result"></div>

  <br />
  <a class="cta" href="https://rothiracalculator.app/">Roth IRA Calculator</a>

  <footer>
    <p>For the full-featured tool, visit <a href="https://rothiracalculator.app/">Roth IRA Calculator</a>.</p>
  </footer>

  <script>
    function calculate() {
      const P = parseFloat(document.getElementById('initial').value) || 0;
      const C = parseFloat(document.getElementById('annual').value) || 0;
      const r = parseFloat(document.getElementById('rate').value) / 100;
      const n = parseInt(document.getElementById('years').value);
      if (!r || !n) { document.getElementById('result').textContent = 'Please fill in all fields.'; return; }
      const fv = P * Math.pow(1 + r, n) + C * ((Math.pow(1 + r, n) - 1) / r);
      document.getElementById('result').textContent = 'Estimated Balance: $' + fv.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
  </script>
</body>
</html>
